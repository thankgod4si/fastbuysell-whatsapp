name: Deploy to AWS App Runner

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: 751702759480
  ECR_REPO: outreachhq
  SERVICE_NAME: OutReachhq

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR repo if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPO --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository --repository-name $ECR_REPO --region $AWS_REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Create IAM role for App Runner ECR access (if not exists)
        run: |
          aws iam get-role --role-name AppRunnerECRAccessRole 2>/dev/null || \
          (aws iam create-role \
            --role-name AppRunnerECRAccessRole \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"build.apprunner.amazonaws.com"},"Action":"sts:AssumeRole"}]}' && \
          aws iam attach-role-policy \
            --role-name AppRunnerECRAccessRole \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess)

      - name: Deploy to App Runner
        run: |
          ECR_IMAGE="${{ steps.login-ecr.outputs.registry }}/$ECR_REPO:latest"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/AppRunnerECRAccessRole"

          SOURCE_CONFIG="{
            \"ImageRepository\": {
              \"ImageIdentifier\": \"$ECR_IMAGE\",
              \"ImageRepositoryType\": \"ECR\",
              \"ImageConfiguration\": {
                \"Port\": \"3000\",
                \"RuntimeEnvironmentVariables\": {
                  \"NODE_ENV\": \"production\",
                  \"NEXT_PUBLIC_SUPABASE_URL\": \"${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}\",
                  \"NEXT_PUBLIC_SUPABASE_ANON_KEY\": \"${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}\",
                  \"SUPABASE_SERVICE_ROLE_KEY\": \"${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}\",
                  \"WHATSAPP_PHONE_NUMBER_ID\": \"${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}\",
                  \"WHATSAPP_BUSINESS_ACCOUNT_ID\": \"${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}\",
                  \"WHATSAPP_ACCESS_TOKEN\": \"${{ secrets.WHATSAPP_ACCESS_TOKEN }}\",
                  \"WHATSAPP_WEBHOOK_VERIFY_TOKEN\": \"${{ secrets.WHATSAPP_WEBHOOK_VERIFY_TOKEN }}\",
                  \"WHATSAPP_FLOW_ID\": \"${{ secrets.WHATSAPP_FLOW_ID }}\",
                  \"RESEND_API_KEY\": \"${{ secrets.RESEND_API_KEY }}\",
                  \"EMAIL_FROM\": \"${{ secrets.EMAIL_FROM }}\",
                  \"BREVO_SMS_SENDER\": \"FastBuySell\",
                  \"CRON_SECRET\": \"${{ secrets.CRON_SECRET }}\",
                  \"NEXT_PUBLIC_APP_URL\": \"${{ secrets.NEXT_PUBLIC_APP_URL }}\"
                }
              }
            },
            \"AuthenticationConfiguration\": {
              \"AccessRoleArn\": \"$ROLE_ARN\"
            },
            \"AutoDeploymentsEnabled\": false
          }"

          # Check if service already exists
          SERVICE_ARN=$(aws apprunner list-services --region $AWS_REGION \
            --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceArn" \
            --output text)

          if [ -n "$SERVICE_ARN" ]; then
            echo "Deleting existing App Runner service: $SERVICE_ARN"
            aws apprunner delete-service --service-arn "$SERVICE_ARN" --region $AWS_REGION
            echo "Waiting for deletion to complete..."
            aws apprunner wait service-inactive --service-arn "$SERVICE_ARN" --region $AWS_REGION 2>/dev/null || sleep 60
          fi

          echo "Creating new App Runner service..."
          aws apprunner create-service \
            --region $AWS_REGION \
            --service-name $SERVICE_NAME \
            --source-configuration "$SOURCE_CONFIG" \
            --instance-configuration "{\"Cpu\": \"1 vCPU\", \"Memory\": \"2 GB\"}"
